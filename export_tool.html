<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>游戏打点数据导出工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    max-width: 640px;
    width: 100%;
    padding: 36px 40px;
  }

  .card h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 4px;
  }

  .card .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 28px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: #333;
    margin-bottom: 6px;
  }

  .form-group select,
  .form-group input[type="datetime-local"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d9d9d9;
    border-radius: 8px;
    font-size: 15px;
    background: #fff;
    transition: border-color 0.2s;
    outline: none;
  }

  .form-group select:focus,
  .form-group input[type="datetime-local"]:focus {
    border-color: #4f6ef7;
    box-shadow: 0 0 0 3px rgba(79,110,247,0.12);
  }

  .time-row {
    display: flex;
    gap: 16px;
  }

  .time-row .form-group {
    flex: 1;
  }

  .btn-export {
    width: 100%;
    padding: 12px 0;
    background: #4f6ef7;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
  }

  .btn-export:hover {
    background: #3b5bd9;
  }

  .btn-export:active {
    transform: scale(0.98);
  }

  .btn-export:disabled {
    background: #b0b8d6;
    cursor: not-allowed;
    transform: none;
  }

  .status-area {
    margin-top: 20px;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
  }

  .status-area.info {
    display: block;
    background: #eef2ff;
    color: #2d46b9;
    border: 1px solid #d0d9ff;
  }

  .status-area.success {
    display: block;
    background: #ecfdf5;
    color: #065f46;
    border: 1px solid #a7f3d0;
  }

  .status-area.error {
    display: block;
    background: #fef2f2;
    color: #991b1b;
    border: 1px solid #fecaca;
  }

  .status-area.loading {
    display: block;
    background: #fafafa;
    color: #555;
    border: 1px solid #e5e5e5;
  }

  .status-area .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #ddd;
    border-top-color: #4f6ef7;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .debug-toggle {
    margin-top: 20px;
    font-size: 12px;
    color: #aaa;
    text-align: center;
    cursor: pointer;
    user-select: none;
  }

  .debug-toggle:hover {
    color: #666;
  }

  .debug-info {
    margin-top: 8px;
    padding: 10px 14px;
    background: #f9f9f9;
    border: 1px solid #eee;
    border-radius: 8px;
    font-size: 12px;
    font-family: "SFMono-Regular", Consolas, monospace;
    color: #666;
    word-break: break-all;
    display: none;
  }

  .debug-info.visible {
    display: block;
  }

  .extra-info {
    font-size: 12px;
    color: #999;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>📊 打点数据导出</h1>
  <p class="subtitle">选择时间范围，一键导出 CSV 文件</p>

  <!-- 项目选择 -->
  <div class="form-group">
    <label for="packageName">游戏项目</label>
    <select id="packageName">
      <option value="com.test.sunmote">☀️ Sunmote (com.test.sunmote)</option>
    </select>
  </div>

  <!-- 时间选择 -->
  <div class="time-row">
    <div class="form-group">
      <label for="startTime">开始时间</label>
      <input type="datetime-local" id="startTime" />
    </div>
    <div class="form-group">
      <label for="endTime">结束时间</label>
      <input type="datetime-local" id="endTime" />
    </div>
  </div>

  <!-- 导出按钮 -->
  <button class="btn-export" id="exportBtn" onclick="handleExport()">导出数据</button>

  <!-- 状态提示区 -->
  <div class="status-area" id="statusArea"></div>

  <!-- 调试信息 -->
  <div class="debug-toggle" onclick="toggleDebug()">🔧 显示请求详情</div>
  <div class="debug-info" id="debugInfo"></div>
</div>

<script>
// ============================================================
// 1. MD5 实现（纯 JS，浏览器兼容）
// ============================================================
function md5(str) {
  function rotateLeft(x, n) { return (x << n) | (x >>> (32 - n)); }
  function toHex(i) { var s = "", v; for (var j = 0; j < 4; j++) { s += "0123456789abcdef".charAt((v = (i >>> (j * 8)) & 0xff) >>> 4 & 0x0f) + "0123456789abcdef".charAt(v & 0x0f); } return s; }
  function add32(x, y) { return (x + y) & 0xffffffff; }
  function toBytes(s) { var r = []; for (var i = 0; i < s.length; i++) r.push(s.charCodeAt(i)); return r; }

  var bytes = toBytes(unescape(encodeURIComponent(str)));
  bytes.push(0x80);
  while ((bytes.length & 63) !== 56) bytes.push(0);
  var bitLen = str.length * 8;
  for (var i = 0; i < 8; i++) bytes.push((bitLen >>> (i * 8)) & 0xff);

  var h0 = 0x67452301, h1 = 0xefcdab89, h2 = 0x98badcfe, h3 = 0x10325476;
  var k = [0xd76aa478,0xe8c7b756,0x242070db,0xc1bdceee,0xf57c0faf,0x4787c62a,0xa8304613,0xfd469501,0x698098d8,0x8b44f7af,0xffff5bb1,0x895cd7be,0x6b901122,0xfd987193,0xa679438e,0x49b40821,0xf61e2562,0xc040b340,0x265e5a51,0xe9b6c7aa,0xd62f105d,0x02441453,0xd8a1e681,0xe7d3fbc8,0x21e1cde6,0xc33707d6,0xf4d50d87,0x455a14ed,0xa9e3e905,0xfcefa3f8,0x676f02d9,0x8d2a4c8a,0xfffa3942,0x8771f681,0x6d9d6122,0xfde5380c,0xa4beea44,0x4bdecfa9,0xf6bb4b60,0xbebfbc70,0x289b7ec6,0xeaa127fa,0xd4ef3085,0x04881d05,0xd9d4d039,0xe6db99e5,0x1fa27cf8,0xc4ac5665,0xf4292244,0x432aff97,0xab9423a7,0xfc93a039,0x655b59c3,0x8f0ccc92,0xffeff47d,0x85845dd1,0x6fa87e4f,0xfe2ce6e0,0xa3014314,0x4e0811a1,0xf7537e82,0xbd3af235,0x2ad7d2bb,0xeb86d391];
  var s = [7,12,17,22,7,12,17,22,7,12,17,22,7,12,17,22,5,9,14,20,5,9,14,20,5,9,14,20,5,9,14,20,4,11,16,23,4,11,16,23,4,11,16,23,4,11,16,23,6,10,15,21,6,10,15,21,6,10,15,21,6,10,15,21];

  for (var offset = 0; offset < bytes.length; offset += 64) {
    var w = [], a = h0, b = h1, c = h2, d = h3;
    for (var i = 0; i < 16; i++) {
      var off = offset + i * 4;
      w[i] = bytes[off] | (bytes[off + 1] << 8) | (bytes[off + 2] << 16) | (bytes[off + 3] << 24);
    }
    for (var i = 0; i < 64; i++) {
      var f, g;
      if (i < 16) { f = (b & c) | (~b & d); g = i; }
      else if (i < 32) { f = (d & b) | (~d & c); g = (5 * i + 1) % 16; }
      else if (i < 48) { f = b ^ c ^ d; g = (3 * i + 5) % 16; }
      else { f = c ^ (b | ~d); g = (7 * i) % 16; }
      var tmp = d;
      d = c;
      c = b;
      b = add32(b, rotateLeft(add32(a, add32(f, add32(k[i], w[g]))), s[i]));
      a = tmp;
    }
    h0 = add32(h0, a);
    h1 = add32(h1, b);
    h2 = add32(h2, c);
    h3 = add32(h3, d);
  }
  return toHex(h0) + toHex(h1) + toHex(h2) + toHex(h3);
}

// ============================================================
// 2. 配置
// ============================================================
const API_BASE    = "https://api.zhenniubi.site/api/game/event/export";
const DEVICE_ID   = "test_device_001";
const GAME_PREFIX = "sunmote_game:";
const TOKEN       = md5(GAME_PREFIX + DEVICE_ID);

// ============================================================
// 3. 初始化：时间选择器默认值
// ============================================================
(function initDates() {
  // 默认开始：3天前 00:00
  // 默认结束：当天 23:59
  var now = new Date();
  var start = new Date(now);
  start.setDate(start.getDate() - 3);
  start.setHours(0, 0, 0, 0);
  var end = new Date(now);
  end.setHours(23, 59, 0, 0);

  function toLocalISO(d) {
    var y = d.getFullYear();
    var M = String(d.getMonth() + 1).padStart(2, "0");
    var D = String(d.getDate()).padStart(2, "0");
    var h = String(d.getHours()).padStart(2, "0");
    var m = String(d.getMinutes()).padStart(2, "0");
    return y + "-" + M + "-" + D + "T" + h + ":" + m;
  }

  document.getElementById("startTime").value = toLocalISO(start);
  document.getElementById("endTime").value   = toLocalISO(end);
})();

// ============================================================
// 4. 导出逻辑
// ============================================================
function setStatus(msg, type) {
  var el = document.getElementById("statusArea");
  el.innerHTML = msg;
  el.className = "status-area " + type;
}

function setDebug(text) {
  document.getElementById("debugInfo").textContent = text;
}

function toggleDebug() {
  document.getElementById("debugInfo").classList.toggle("visible");
}

function datetimeToUnix(dtStr) {
  return Math.floor(new Date(dtStr).getTime() / 1000);
}

async function handleExport() {
  var btn = document.getElementById("exportBtn");
  var pkg = document.getElementById("packageName").value;
  var startStr = document.getElementById("startTime").value;
  var endStr   = document.getElementById("endTime").value;

  // 校验
  if (!startStr || !endStr) {
    setStatus("请选择开始时间和结束时间。", "error");
    return;
  }

  var startTs = datetimeToUnix(startStr);
  var endTs   = datetimeToUnix(endStr);

  if (startTs >= endTs) {
    setStatus("结束时间必须晚于开始时间。", "error");
    return;
  }

  // 构造 URL
  var url = API_BASE + "?package_name=" + encodeURIComponent(pkg)
          + "&start_time=" + startTs
          + "&end_time=" + endTs;

  // 显示调试信息
  setDebug(
    "请求 URL: " + url + "\n"
    + "device_id: " + DEVICE_ID + "\n"
    + "token: " + TOKEN + "\n"
    + "开始时间戳: " + startTs + "\n"
    + "结束时间戳: " + endTs + "\n"
    + "本地时间: " + startStr + " ~ " + endStr
  );

  // 禁用按钮
  btn.disabled = true;
  btn.textContent = "导出中…";
  setStatus('<span class="spinner"></span>正在请求服务器，请稍候…', "loading");

  try {
    var resp = await fetch(url, {
      method: "GET",
      headers: {
        "token": TOKEN,
        "device_id": DEVICE_ID,
        "Content-Type": "application/json"
      }
    });

    var text = await resp.text();

    // 检查是否为 JSON 错误消息
    var trimmed = text.trim();
    if (trimmed.startsWith("{")) {
      try {
        var errObj = JSON.parse(trimmed);
        setStatus("服务器返回错误：<br/>" + (errObj.message || errObj.msg || JSON.stringify(errObj)), "error");
        return;
      } catch (e) {
        // 不是合法 JSON，继续当作正常 CSV
      }
    }

    if (!resp.ok) {
      setStatus("请求失败，HTTP " + resp.status + "：" + (text.slice(0, 200)), "error");
      return;
    }

    // 生成文件名
    var now = new Date();
    function pad(n) { return String(n).padStart(2, "0"); }
    var fileName = "events_"
      + now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate()) + "_"
      + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds())
      + ".csv";

    // 触发浏览器下载（弹"另存为"对话框）
    var blob = new Blob([text], { type: "text/csv;charset=utf-8" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);

    // 统计行数
    var lineCount = text.trim().split("\n").length;

    setStatus(
      "✅ 导出成功！<br/>"
      + "📄 文件：" + fileName + "<br/>"
      + "📊 数据行数：<strong>" + lineCount + "</strong> 行（含表头）<br/>"
      + "🕐 时间范围：<code>" + startStr + "</code> ~ <code>" + endStr + "</code><br/>"
      + "💾 浏览器已弹出「另存为」对话框，请选择保存位置。",
      "success"
    );

  } catch (err) {
    setStatus("❌ 网络错误：" + err.message + "<br/>请检查网络连接或联系开发。", "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "导出数据";
  }
}
</script>

</body>
</html>
